# Render Blueprint — deploys the whole app as one full-stack web service.
# The build step installs both backend and frontend deps and builds the React app;
# at runtime Express serves the API and the built frontend from the same origin.
services:
  - type: web
    name: secure-auth-microservice
    runtime: node
    plan: free
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      # Secrets below are NOT stored in the repo — set them in the Render dashboard.
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      # Your live Render URL, e.g. https://secure-auth-microservice.onrender.com
      - key: CLIENT_URL
        sync: false
    # NOTE: do NOT set PORT — Render injects it automatically and the server reads process.env.PORT.
